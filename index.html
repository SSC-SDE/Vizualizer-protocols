<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WIREDEPTH — 3D Protocol Traffic Visualizer</title>
<link rel="stylesheet" href="css/style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app"></div>

<!-- ===== Top-left: live stats ===== -->
<div class="panel hud-stats" id="hud-stats">
  <div class="panel-title">⏚ WIREDEPTH <span class="dim">// live wire telemetry</span></div>
  <div class="stat-grid" id="stat-grid"></div>
  <div id="layer-meter"></div>
  <div class="chart-label">packets in flight per OSI lane <span class="dim">— matches the 3D strata</span></div>
  <canvas id="chart-throughput" width="280" height="64"></canvas>
  <div class="chart-label">throughput <span class="dim">Mbps (sim)</span></div>
  <canvas id="chart-pps" width="280" height="64"></canvas>
  <div class="chart-label">packets/s <span class="ok">■ delivered</span> <span class="bad">■ dropped</span> <span class="warn">■ retransmit</span></div>
</div>

<!-- ===== Top-right: inspector ===== -->
<div class="panel hud-inspector" id="hud-inspector">
  <div class="panel-title">INSPECTOR <span class="dim" id="inspector-mode">// click a packet, host or flow</span></div>
  <div id="flow-list"></div>
  <div id="inspector-body"></div>
</div>

<!-- ===== Role-play: datagram dissection card (separate panel) ===== -->
<div class="panel hud-datagram" id="hud-datagram" hidden>
  <div class="panel-title">DATAGRAM <span class="dim">// click a wire-ladder row to dissect</span></div>
  <div id="datagram-body"></div>
</div>

<!-- ===== Bottom: control deck ===== -->
<div class="panel hud-controls" id="hud-controls">
  <div class="ctl-group">
    <button id="btn-guide" title="key G">🎓 guide</button>
    <button id="btn-roleplay" title="key P">🎭 role-play</button>
    <button id="btn-pause" title="space">⏸ pause</button>
    <button id="btn-reset" title="key R">⟲ reset</button>
    <label>time <input type="range" id="sl-speed" min="0.1" max="4" step="0.1" value="1"><span id="sl-speed-v">1.0×</span></label>
    <label>loss <input type="range" id="sl-loss" min="0" max="30" step="1" value="2"><span id="sl-loss-v">2%</span></label>
    <label>ambient <input type="range" id="sl-ambient" min="0" max="10" step="1" value="2"><span id="sl-ambient-v">2</span></label>
  </div>
  <div class="ctl-group scenarios">
    <button data-scn="handshake" title="key 1">1 · handshake</button>
    <button data-scn="download" title="key 2">2 · file transfer</button>
    <button data-scn="lossburst" title="key 3">3 · loss burst</button>
    <button data-scn="synflood" title="key 4">4 · SYN flood</button>
    <button data-scn="dnsstorm" title="key 5">5 · DNS storm</button>
    <button data-scn="stream" title="key 6">6 · UDP stream</button>
    <button data-scn="ping" title="key 7">7 · ping</button>
    <button data-scn="traceroute" title="key 8">8 · traceroute</button>
    <button data-scn="arp" title="key 9">9 · ARP sweep</button>
  </div>
  <div class="ctl-group legend" id="legend"></div>
</div>

<!-- ===== Guide mode narrator ===== -->
<div class="panel hud-tutor" id="hud-tutor" hidden>
  <div class="tutor-head">
    <span class="tutor-chip" id="tutor-chip">GUIDE</span>
    <span class="tutor-title" id="tutor-title"></span>
    <button class="tutor-exit" id="tutor-exit" title="exit guide mode">✕</button>
  </div>
  <div id="tutor-body"></div>
  <div class="tutor-foot">
    <label><input type="checkbox" id="tutor-steppause"> pause at each step</label>
    <button id="tutor-continue" hidden>▶ continue</button>
    <span class="dim" id="tutor-progress"></span>
  </div>
</div>

<!-- ===== Role-play: action deck + overlays ===== -->
<div class="panel hud-deck" id="hud-deck" hidden></div>
<div class="rp-overlay" id="rp-picker" hidden></div>
<div class="rp-overlay" id="rp-recap" hidden></div>

<!-- ===== Event ticker ===== -->
<div id="ticker"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
